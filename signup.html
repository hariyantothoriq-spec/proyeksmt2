<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Minishop - Free Bootstrap 4 Template by Colorlib</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/images/favicon_io/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/images/favicon_io/favicon-16x16.png">
  <link rel="manifest" href="./assets/images/favicon_io/site.webmanifest">

  <link rel="stylesheet" href="css/open-iconic-bootstrap.min.css">
  <link rel="stylesheet" href="css/animate.css">
  <link rel="stylesheet" href="css/owl.carousel.min.css">
  <link rel="stylesheet" href="css/owl.theme.default.min.css">
  <link rel="stylesheet" href="css/magnific-popup.css">
  <link rel="stylesheet" href="css/aos.css">
  <link rel="stylesheet" href="css/ionicons.min.css">
  <link rel="stylesheet" href="css/bootstrap-datepicker.css">
  <link rel="stylesheet" href="css/jquery.timepicker.css">
  <link rel="stylesheet" href="css/flaticon.css">
  <link rel="stylesheet" href="css/icomoon.css">
  <link rel="stylesheet" href="css/style.css">

  <style>
    /* ========== CSS TAMBAHAN - WARNA UNGU SEPERTI GAMBAR 1 ========== */
    /* HTML tidak diubah sedikitpun */

    /* Background abu-abu muda seperti gambar 1 */
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif !important;
    }

    .min-vh-100 {
     background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    /* Card putih dengan bayangan */
    .card {
      border: none !important;
      border-radius: 12px !important;
      background: linear-gradient(135deg, #ffffff 0%, #ffffff 100%) !important;
      box-shadow: 0 1px 10px rgba(0, 0, 0, 0.08) !important;
      animation: slideUp 0.5s ease-out !important;
    }

    @keyframes slideUp {
      from {
      opacity: 0;
      transform: translateY(30px);
      }
      to {
      opacity: 1;
      transform: translateY(0);
      }
    }

    .card-body {
      padding: 2rem !important;
    }

    /* Judul */
    .card-title {
      font-size: 1.5rem !important;
      font-weight: 600 !important;
      color: #1a1a2e !important;
      margin-bottom: 0 !important;
      text-align: center !important;
    }

    /* Hilangkan pseudo-element */
    .text-center.mb-3::after {
      display: none !important;
    }

    /* Label form */
    .form-label {
      font-size: 0.8rem !important;
      font-weight: 600 !important;
      color: #333 !important;
      margin-bottom: 0.25rem !important;
    }

    /* Input field */
    .form-control {
      border-radius: 8px !important;
      border: 1px solid #ddd !important;
      padding: 0.5rem 0.75rem !important;
      font-size: 0.9rem !important;
      background: #ffffff !important;
    }

    .form-control:focus {
      border-color: #8b5cf6 !important;
      outline: none !important;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1) !important;
    }

    /* TOMBOL UNGU seperti gambar 1 */
    .btn-primary {
      background-color: #8b5cf6 !important;
      border: none !important;
      border-radius: 8px !important;
      padding: 0.6rem !important;
      font-weight: 500 !important;
      font-size: 0.9rem !important;
      color: white !important;
    }

    .btn-primary:hover {
      background-color: #7c3aed !important;
    }

    /* Checkbox ungu */
    .form-check-input {
      border-radius: 4px !important;
      border: 1px solid #ddd !important;
      width: 1rem;
      height: 1rem;
      margin-top: 0.2rem;
    }

    .form-check-input:checked {
      background-color: #8b5cf6 !important;
      border-color: #8b5cf6 !important;
    }

    .form-check-label {
      font-size: 0.8rem !important;
      color: #333 !important;
    }

    .form-check-label a {
      color: #8b5cf6 !important;
      text-decoration: none !important;
    }

    .form-check-label a:hover {
      text-decoration: underline !important;
    }

    /* Link ungu seperti gambar 1 */
    .text-center.mt-3 a,
    .link-primary {
      color: #8b5cf6 !important;
      text-decoration: none !important;
      font-weight: 500 !important;
    }

    .text-center.mt-3 a:hover {
      text-decoration: underline !important;
    }

    .small.text-muted {
      color: #888 !important;
      font-size: 0.8rem !important;
    }

    /* Tombol Kembali */
    .btn-primary[style*="position: absolute"] {
      background: #ffffff !important;
      color: #8b5cf6 !important;
      border: 1px solid #8b5cf6 !important;
      border-radius: 8px !important;
      box-shadow: none !important;
    }

    .btn-primary[style*="position: absolute"]:hover {
      background: #f3e8ff !important;
    }

    /* Spasi */
    .mb-3 {
      margin-bottom: 1rem !important;
    }
  </style>
</head>

<body>
  <a href="signin.html" class="btn btn-primary" style="position: absolute; top: 20px; left: 20px; z-index: 100;">
    <span class="ion-ios-arrow-back mr-2"></span> Kembali
  </a>

<div class="container d-flex align-items-center justify-content-center min-vh-100">
  <div class="card " style="max-width:420px; width:100%;">
    <div class="card-body p-5">
      <div class="text-center mb-3">
     <a href="index.html" class="mb-4 d-inline-block"><img src="./assets/images/logo-icon.svg" alt="" width="36">
      <span class="ms-2"> <img src="./assets/images/logo.svg" alt=""></span>
      </a>
        <h1 class="card-title mb-5 h5">Daftar Akun</h1>

      </div>

      <form class="needs-validation mt-3" novalidate>
        <div class="mb-3">
          <label for="fullName" class="form-label">Nama Lengkap</label>
          <input id="fullName" type="text" class="form-control" placeholder="Jane Doe" required>
          <div class="invalid-feedback">Masukkan nama lengkap anda.</div>
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Alamat Email</label>
          <input id="email" type="email" class="form-control" placeholder="name@contoh.com" required>
          <div class="invalid-feedback">Sertakan email yang valid.</div>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input id="password" type="password" class="form-control" placeholder="Buat password" required minlength="6">
          <div class="invalid-feedback">Masukkan password (min 6 karakter).</div>
        </div>

        <div class="mb-3">
          <label for="confirmPassword" class="form-label">Konfirmasi Password</label>
          <input id="confirmPassword" type="password" class="form-control" placeholder="Ulangi password" required
            oninput="this.setCustomValidity(document.getElementById('password').value !== this.value ? 'Passwords do not match.' : '')">
          <div class="invalid-feedback">Password harus sesuai.</div>
        </div>

        <div class="mb-3 form-check">
          <input id="terms" class="form-check-input" type="checkbox" required>
          <label class="form-check-label small" for="terms">Saya setuju dengan <a href="#" class="text-decoration-none">syarat dan ketentuan privasi</a></label>
          <div class="invalid-feedback">Kamu harus setuju dengan syarat dan ketentuan sebelum melanjutkan.</div>
        </div>

        <button class="btn btn-primary w-100" type="submit">Daftar</button>
      </form>

      <div class="text-center mt-3 small text-muted">
        Sudah memiliki akun? <a href="signin.html" class="link-primary">Masuk</a>
      </div>
    </div>
  </div>
</div>

  <!-- Bootstrap JS -->
  <script src="./assets/js/main.js" type="module"></script>

  <script>
    (function () {
      'use strict'
      var forms = document.querySelectorAll('.needs-validation')
      Array.prototype.slice.call(forms).forEach(function (form) {
        form.addEventListener('submit', function (event) {
          event.preventDefault()
          if (!form.checkValidity()) {
            event.stopPropagation()
            alert('Peringatan: Anda harus melengkapi semua data pendaftaran terlebih dahulu!')
          } else {
            alert('Pendaftaran berhasil! Anda akan dialihkan ke halaman Sign In.')
            window.location.href = 'signin.html'
          }
          form.classList.add('was-validated')
        }, false)
      })
    })()
  </script>

</body>

</html>
